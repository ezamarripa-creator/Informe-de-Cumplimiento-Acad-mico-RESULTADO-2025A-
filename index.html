<!DOCTYPE html>
<html lang="es">
<head>

    <script>
    (function() {
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
      
       document.addEventListener('keydown', function(e) {
            const key = e.key.toLowerCase();
            if ((e.ctrlKey && (key === 'u' || key === 's' || key === 'c' || key === 'i' || key === 'j')) ||
                (e.ctrlKey && e.shiftKey && (key === 'i' || key === 'j' || key === 'c')) ||
                e.key === 'F12') {
                e.preventDefault();
                return false;
            }
        });
        
        let devtoolsTriggered = false;
        setInterval(function() {
            if (devtoolsTriggered) return;
            const before = new Date();
            debugger; 
            const after = new Date();
            if (after - before > 100) { 
                devtoolsTriggered = true;
                document.body.innerHTML = '<div style="text-align:center; padding:50px; font-family:sans-serif;"><h1 style="color:#042C53;">⚠️ Acceso no autorizado</h1><p>El uso de herramientas de desarrollo no está permitido en este recurso institucional.</p><p style="font-size:14px; margin-top:30px;">🔒 COBAED · Dirección Académica</p></div>';
            }
        }, 2000);
        
        const style = document.createElement('style');
        style.textContent = `body { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; }`;
        document.head.appendChild(style);
    })();
    </script>


    
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Académico PAEC - Ranking Estratégico</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --accent: #3b82f6; --success: #22c55e; --warning: #eab308; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary) 0%, #3b82f6 100%); color: white; padding: 25px 35px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .data-status { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.3); }
        
        .filters { background: var(--card); padding: 20px; border-radius: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 0.8rem; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        select { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; font-size: 0.9rem; }

        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--card); padding: 20px; border-radius: 12px; border-top: 4px solid var(--accent); box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .kpi-title { font-size: 0.7rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .kpi-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }

        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 25px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 400px; }
        
        .ranking-section { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; background: #f8fafc; color: #64748b; padding: 12px; font-size: 0.85rem; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .badge-rank { background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: white; display: inline-block; }
        .bg-success { background-color: var(--success); }
        .bg-warning { background-color: var(--warning); color: #000; }
        .bg-danger { background-color: var(--danger); }

        @media (max-width: 1024px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0">Indicadores de Desempeño Académico</h1>
        <p style="margin:5px 0 0 0; opacity: 0.8">Análisis de Desempeño y Posicionamiento</p>
    </div>
    <div id="loadingStatus" class="data-status">
        Conectando con GitHub...
    </div>
</div>

<div class="filters">
    <div class="filter-group"><label>Plantel</label><select id="fPlantel"><option value="all">Todos</option></select></div>
    <div class="filter-group"><label>Turno</label><select id="fTurno"><option value="all">Todos</option></select></div>
    <div class="filter-group"><label>Sector</label><select id="fSector"><option value="all">Todos</option></select></div>
    <div class="filter-group"><label>Tipo</label><select id="fTipo"><option value="all">Todos</option></select></div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="charts-container">
    <div class="chart-box" id="chartMain"></div>
    <div class="chart-box" id="chartRep"></div>
</div>

<div class="ranking-section">
    <h3 style="margin-top:0">Tabla de Ranking Global por Plantel</h3>
    <table id="rankingTable">
        <thead>
            <tr>
                <th>Ranking Global</th>
                <th>Nombre del Plantel</th>
                <th>Sector</th>
                <th>Semestral</th>
                <th>Puntuación Total</th>
                <th>Estatus</th>
            </tr>
        </thead>
        <tbody id="rankingBody"></tbody>
    </table>
</div>

<script>
    // Configuración de la URL de datos
    const GITHUB_DATA_URL = 'datos.json'; 
    let globalData = [];

    // Función de inicio: Carga los datos automáticamente al abrir
    async function loadDataFromGitHub() {
        const statusEl = document.getElementById('loadingStatus');
        try {
            const response = await fetch(GITHUB_DATA_URL);
            if (!response.ok) throw new Error('No se pudo encontrar el archivo datos.json');
            
            globalData = await response.json();
            statusEl.innerHTML = "● Datos sincronizados";
            statusEl.style.color = "#bef264"; // Verde claro
            
            initDashboard();
        } catch (err) {
            console.error(err);
            statusEl.innerHTML = "❌ Error al cargar datos";
            statusEl.style.color = "#fda4af"; // Rojo claro
            alert("Asegúrate de que 'datos.json' esté en la misma carpeta del repositorio.");
        }
    }

    function initDashboard() {
        populateFilters();
        renderAll();
    }

    function populateFilters() {
        const unique = (key) => [...new Set(globalData.map(item => item[key]))].sort();
        fillSelect('fPlantel', unique('Nombre plantel'));
        fillSelect('fTurno', unique('Turno'));
        fillSelect('fSector', unique('Sector'));
        fillSelect('fTipo', unique('Tipo'));
    }

    function fillSelect(id, values) {
        const el = document.getElementById(id);
        const current = el.value;
        el.innerHTML = `<option value="all">Todos</option>`;
        values.forEach(v => { if(v) el.innerHTML += `<option value="${v}">${v}</option>`; });
        if([...el.options].some(o => o.value === current)) el.value = current;
    }

    function parse(val) {
        if (typeof val === 'string') return parseFloat(val.replace('%', '').replace(',', '')) || 0;
        return parseFloat(val) || 0;
    }

    function getStatusInfo(rank) {
        const r = parseInt(rank);
        if (r >= 1 && r <= 12) return { label: 'Sobresaliente', class: 'bg-success' };
        if (r >= 13 && r <= 24) return { label: 'Satisfactorio', class: 'bg-warning' };
        return { label: 'Bajo / Alerta', class: 'bg-danger' };
    }

    function renderAll() {
        if(globalData.length === 0) return;

        const filtered = globalData.filter(d => {
            return (document.getElementById('fPlantel').value === 'all' || d['Nombre plantel'] === document.getElementById('fPlantel').value) &&
                   (document.getElementById('fTurno').value === 'all' || d['Turno'] === document.getElementById('fTurno').value) &&
                   (document.getElementById('fSector').value === 'all' || d['Sector'] === document.getElementById('fSector').value) &&
                   (document.getElementById('fTipo').value === 'all' || d['Tipo'] === document.getElementById('fTipo').value);
        });

        if(filtered.length === 0) {
            document.getElementById('kpiGrid').innerHTML = "<p>No hay datos disponibles para estos filtros.</p>";
            return;
        }

        const avg = (arr) => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : 0;
        
        const metrics = [
            ["IGCA Promedio", avg(filtered.map(d => parse(d['Puntuación de Semestral mas puntuación parciales'])))],
            ["Plan. Entregadas", avg(filtered.flatMap(d => [parse(d['% de planeaciones entregadas en PARCIAL 1']), parse(d['% de planeaciones entregadas en PARCIAL 2']), parse(d['% de planeaciones entregadas en PARCIAL 3'])])).toString() + "%"],
            ["Plan. Aprobadas", avg(filtered.flatMap(d => [parse(d['% de planeaciones APROBADAS en PARCIAL 1']), parse(d['% de planeaciones APROBADAS en PARCIAL 2']), parse(d['% de planeaciones APROBADAS en PARCIAL 3'])])).toString() + "%"],
            ["Reprobación Prom.", avg(filtered.flatMap(d => [parse(d['Índices de reprobación en PARCIAL 1']), parse(d['Índices de reprobación en PARCIAL 2']), parse(d['Índices de reprobación en PARCIAL 3'])])).toString() + "%"],
            ["Asistencia Académica", avg(filtered.flatMap(d => [parse(d['Porcentaje de asistencia al Colegiado Académico en PARCIAL 1']), parse(d['Porcentaje de asistencia al Colegiado Académico en PARCIAL 2']), parse(d['Porcentaje de asistencia al Colegiado Académico en PARCIAL 3'])])).toString() + "%"]
        ];

        document.getElementById('kpiGrid').innerHTML = metrics.map(m => `
            <div class="kpi-card">
                <div class="kpi-title">${m[0]}</div>
                <div class="kpi-value">${m[1]}</div>
            </div>
        `).join('');

        Plotly.newPlot('chartMain', [{
            x: filtered.map(d => d['Nombre plantel']),
            y: filtered.map(d => parse(d['Puntuación de Semestral mas puntuación parciales'])),
            type: 'bar', marker: {color: '#3b82f6'}
        }], { title: 'Puntuación Total Acumulada', margin: {t:40, b:80} });

        Plotly.newPlot('chartRep', [{
            x: ['Parcial 1', 'Parcial 2', 'Parcial 3'],
            y: [
                avg(filtered.map(d => parse(d['Índices de reprobación en PARCIAL 1']))),
                avg(filtered.map(d => parse(d['Índices de reprobación en PARCIAL 2']))),
                avg(filtered.map(d => parse(d['Índices de reprobación en PARCIAL 3'])))
            ],
            type: 'scatter', mode: 'lines+markers', line: {color: '#ef4444', width: 3}
        }], { title: 'Tendencia de Reprobación', yaxis: {title: '%'} });

        const sorted = [...filtered].sort((a, b) => (a['Ranking global'] || 999) - (b['Ranking global'] || 999));
        document.getElementById('rankingBody').innerHTML = sorted.map(d => {
            const status = getStatusInfo(d['Ranking global']);
            return `
            <tr>
                <td><span class="badge-rank">${d['Ranking global'] || '-'}</span></td>
                <td><b>${d['Nombre plantel']}</b></td>
                <td>${d['Sector']}</td>
                <td>${d['Semestral'] || '0.00'}</td>
                <td>${d['Puntuación de Semestral mas puntuación parciales']}</td>
                <td><span class="status-pill ${status.class}">${status.label}</span></td>
            </tr>
            `;
        }).join('');
    }

    // Eventos de filtros
    document.querySelectorAll('select').forEach(s => s.addEventListener('change', renderAll));

    // Ejecutar carga inicial
    loadDataFromGitHub();
</script>

</body>
</html>
